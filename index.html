<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkmate — Game Review</title>
  <style>
    :root{--bg:#07111d;--panel:#0e1c2d;--panel2:#13263a;--line:#263e55;--ink:#eef6ff;--muted:#8da4ba;--blue:#3b8cff;--cyan:#65b6ff;--light:#dce9f1;--dark:#53768d;--best:#63d395;--warn:#f7bd5d;--bad:#f06d78}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(850px 520px at 100% -5%,#133b6966,transparent 70%),var(--bg);color:var(--ink);font:14px/1.4 Inter,system-ui,sans-serif}button,input,textarea{font:inherit}.app{max-width:1420px;margin:auto;padding:24px}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.brand{font-size:22px;font-weight:900;letter-spacing:-.8px}.brand i{color:var(--blue);font-style:normal}.subtitle{color:var(--muted);font-weight:600}.primary{border:0;border-radius:8px;padding:10px 15px;background:var(--blue);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 8px 20px #1369cc55}.layout{display:grid;grid-template-columns:minmax(520px,1.12fr) minmax(360px,.88fr);gap:24px;align-items:start}.board-area{display:grid;grid-template-columns:36px 1fr;gap:10px}.eval{height:min(71vw,650px);min-height:480px;position:relative;overflow:hidden;border:1px solid var(--line);border-radius:7px;background:#111e2d}.eval-fill{position:absolute;bottom:0;width:100%;height:50%;background:var(--light);transition:height .25s}.eval-label{position:absolute;z-index:1;inset:10px 0 auto;text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);color:#142332;font-size:12px;font-weight:900}.board{width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(8,1fr);overflow:hidden;border:1px solid #31536d;border-radius:7px;box-shadow:0 16px 50px #0008}.square{position:relative;display:grid;place-items:center;font-family:"Segoe UI Symbol","Arial Unicode MS",serif;font-size:clamp(31px,5.3vw,68px);line-height:1}.light{background:var(--light)}.dark{background:var(--dark)}.last{box-shadow:inset 0 0 0 99px #e4c6598c}.piece.white{color:#fff;text-shadow:0 2px 1px #1d3446,1px 0 #1d3446,-1px 0 #1d3446,0 -1px #1d3446}.piece.black{color:#142635;text-shadow:0 1px #b8cbd8}.rank,.file{position:absolute;font:800 10px/1 Inter,sans-serif}.rank{top:4px;left:5px}.file{right:5px;bottom:4px}.light .rank,.light .file{color:var(--dark)}.dark .rank,.dark .file{color:var(--light)}.card{overflow:hidden;border:1px solid var(--line);border-radius:10px;background:var(--panel);box-shadow:0 12px 32px #0003}.players{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:18px;border-bottom:1px solid var(--line)}.player:last-child{text-align:right}.player b{display:block;font-size:15px}.player span,.label{color:var(--muted);font-size:12px;font-weight:650}.result{padding:6px 10px;border:1px solid #2d5b8b;border-radius:6px;background:#132d4a;color:#b9dcff;font-weight:900}.accuracies{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px;border-bottom:1px solid var(--line)}.accuracy{padding:12px;border-radius:7px;background:var(--panel2)}.accuracy:last-child{text-align:right}.accuracy strong{display:block;font-size:25px;letter-spacing:-1px}.accuracy:last-child strong{color:#add5ff}.tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--line)}.tab{padding:14px 12px 11px;border:0;background:none;color:var(--muted);font-weight:800}.tab.active{color:var(--ink);border-bottom:3px solid var(--blue)}.moves{height:314px;overflow:auto;padding:8px 0}.move-row{display:grid;grid-template-columns:42px 1fr 1fr 78px;min-height:42px;align-items:center;padding:0 16px;border-left:3px solid transparent;cursor:pointer}.move-row:hover{background:#152b43}.move-row.active{border-left-color:var(--blue);background:#173553}.move-no{color:var(--muted);font-weight:800}.san{font-weight:800}.tag{justify-self:end;padding:3px 7px;border-radius:99px;font-size:10px;font-weight:900}.tag.best,.tag.excellent,.tag.great,.tag.good,.tag.forced{color:#a9ebc4;background:#1d493c}.tag.mistake,.tag.inaccuracy,.tag.miss{color:#ffcf87;background:#4c381f}.tag.blunder{color:#ffabb2;background:#512831}.insight{margin:18px;padding:15px;border:1px solid #2d5277;border-radius:7px;background:linear-gradient(100deg,#142e4d,#102238)}.insight h2{margin:0 0 5px;font-size:14px}.insight p{margin:0;color:#b7c7d8}.controls{display:flex;justify-content:center;gap:9px;padding:16px;border-top:1px solid var(--line)}.controls button{width:35px;height:35px;border:0;border-radius:7px;background:var(--panel2);color:var(--ink);font-weight:900;cursor:pointer}.controls .next{width:43px;background:var(--blue)}.modal{position:fixed;inset:0;z-index:5;display:grid;place-items:center;padding:20px;background:#030a13cc}.modal[hidden]{display:none}.dialog{width:min(610px,100%);padding:25px;border:1px solid #315574;border-radius:11px;background:var(--panel);box-shadow:0 24px 80px #000}.dialog h1{margin:0 0 5px;font-size:22px}.dialog p{margin:0 0 18px;color:var(--muted)}textarea{width:100%;height:210px;resize:vertical;padding:12px;border:1px solid var(--line);border-radius:7px;background:#091625;color:var(--ink);font:12px/1.5 ui-monospace,monospace}input[type=file]{width:100%;margin:12px 0;color:var(--muted)}.actions{display:flex;align-items:center;gap:10px;justify-content:flex-end}.secondary{border:0;border-radius:7px;padding:10px 14px;background:#20334a;color:var(--ink);cursor:pointer}.error{margin-right:auto;color:#ff9ba4;font-size:12px}.loading{pointer-events:none;opacity:.65}@media(max-width:900px){.app{padding:16px}.subtitle{display:none}.layout{grid-template-columns:1fr}.board-area{grid-template-columns:1fr}.eval{display:none}.card{margin-top:16px}}@media(max-width:500px){header{margin-bottom:14px}.primary{padding:9px 11px}.square{font-size:10vw}.move-row{grid-template-columns:34px 1fr 1fr 70px;padding:0 9px}.players,.accuracies{padding:14px}}
  </style>
</head>
<body>
  <div class="app"><header><div class="brand">check<i>mate</i></div><div class="subtitle" id="meta">Load a PGN to start reviewing</div><button class="primary" id="open">Review a game</button></header>
    <main class="layout"><section class="board-area"><aside class="eval"><div class="eval-fill" id="evalFill"></div><span class="eval-label" id="evalText">+0.00</span></aside><div class="board" id="board" aria-label="Chess board"></div></section>
      <aside class="card"><div class="players"><div class="player"><b id="whiteName">White</b><span>White</span></div><div class="result" id="result">—</div><div class="player"><b id="blackName">Black</b><span>Black</span></div></div><div class="accuracies"><div class="accuracy"><strong id="whiteAccuracy">—</strong><span class="label">WHITE ACCURACY</span></div><div class="accuracy"><strong id="blackAccuracy">—</strong><span class="label">BLACK ACCURACY</span></div></div><div class="tabs"><button class="tab active">Moves</button></div><div class="moves" id="moveList"></div><div class="insight"><h2 id="insightTitle">Ready to review</h2><p id="insightText">Paste a PGN or upload a .pgn file to see Stockfish's move-by-move review.</p></div><div class="controls"><button id="first" title="First move">|&lt;</button><button id="previous" title="Previous move">&lt;</button><button class="next" id="next" title="Next move">&gt;</button><button id="last" title="Last move">&gt;|</button></div></aside>
    </main></div>
  <div class="modal" id="modal"><form class="dialog" id="form"><h1>Review your game</h1><p>Upload a PGN file or paste your PGN text.</p><textarea id="pgn" placeholder="[Event &quot;My game&quot;]\n\n1. e4 e5 2. Nf3 Nc6 ..."></textarea><input id="file" type="file" accept=".pgn,text/plain"><div class="actions"><span class="error" id="error"></span><button class="secondary" type="button" id="cancel">Cancel</button><button class="primary" id="analyse">Analyse game</button></div></form></div>
  <script>
    const glyph={p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};
    let analysis=null,current=0;
    const $=id=>document.getElementById(id);
    function positionAt(index){return !analysis||index===0?analysis?.starting_fen:analysis.moves[index-1].fen}
    function boardPosition(fen){const squares=[];const rows=fen.split(' ')[0].split('/');rows.forEach((row,rank)=>{let file=0;for(const char of row){const count=Number(char)||1;for(let i=0;i<count;i++){const piece=Number(char)?'':char,light=(rank+file)%2===0,name=String.fromCharCode(97+file)+(8-rank);squares.push({piece,light,name,rank,file});file++}}});return squares}
    function renderBoard(){const fen=positionAt(current)||'8/8/8/8/8/8/8/8';$('board').innerHTML=boardPosition(fen).map(s=>{const last=current&&analysis.moves[current-1].fen===fen?' last':'';const piece=s.piece?`<span class="piece ${s.piece===s.piece.toUpperCase()?'white':'black'}">${glyph[s.piece]}</span>`:'';return `<div class="square ${s.light?'light':'dark'}${last}">${piece}${s.file===0?`<span class="rank">${8-s.rank}</span>`:''}${s.rank===7?`<span class="file">${s.name[0]}</span>`:''}</div>`}).join('')}
    function renderMoves(){const el=$('moveList');if(!analysis){el.innerHTML='';return}el.innerHTML='';for(let i=0;i<analysis.moves.length;i+=2){const a=analysis.moves[i],b=analysis.moves[i+1],active=current===i+1||current===i+2,shown=current===i+1?a:current===i+2?b:null,row=document.createElement('div');row.className='move-row'+(active?' active':'');row.innerHTML=`<span class="move-no">${i/2+1}.</span><span class="san">${a.player_move}</span><span class="san">${b?.player_move||''}</span>${shown?`<span class="tag ${shown.classification.toLowerCase()}">${shown.classification}</span>`:'<span></span>'}`;row.onclick=()=>setMove(i+1);el.appendChild(row)}}
    function evalHeight(value){if(value.includes('Mate'))return value.includes('-')?12:88;const n=parseFloat(value)||0;return Math.max(10,Math.min(90,50+n*5))}
    function setMove(index){if(!analysis){renderBoard();return}current=Math.max(0,Math.min(analysis.moves.length,index));renderBoard();renderMoves();const move=current&&analysis.moves[current-1],text=move?move.evaluation:'+0.00';$('evalText').textContent=text;$('evalFill').style.height=evalHeight(text)+'%';$('insightTitle').textContent=move?`Move ${Math.ceil(current/2)} · ${move.classification}`:'Starting position';$('insightText').textContent=move?`Played ${move.player_move}. Stockfish's best move was ${move.best_move}. Move accuracy: ${move.accuracy}%.`:'Use the arrows or select a move to explore the game.'}
    function load(data){analysis=data;$('meta').textContent=`Game Review · ${data.headers.White||'White'} vs ${data.headers.Black||'Black'}`;$('whiteName').textContent=data.headers.White||'White';$('blackName').textContent=data.headers.Black||'Black';$('result').textContent=data.headers.Result||'*';$('whiteAccuracy').textContent=data.white_accuracy+'%';$('blackAccuracy').textContent=data.black_accuracy+'%';setMove(0)}
    const modal=$('modal'),form=$('form'),error=$('error');$('open').onclick=()=>modal.hidden=false;$('cancel').onclick=()=>modal.hidden=true;$('file').onchange=async e=>{const file=e.target.files[0];if(file)$('pgn').value=await file.text()};form.onsubmit=async e=>{e.preventDefault();const pgn=$('pgn').value.trim();if(!pgn){error.textContent='Choose a file or paste PGN text.';return}form.classList.add('loading');error.textContent='Analysing with Stockfish…';try{const response=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pgn})}),data=await response.json();if(!response.ok)throw Error(data.error||'Analysis failed.');load(data);modal.hidden=true}catch(err){error.textContent=err.message}finally{form.classList.remove('loading')}};$('first').onclick=()=>setMove(0);$('previous').onclick=()=>setMove(current-1);$('next').onclick=()=>setMove(current+1);$('last').onclick=()=>setMove(analysis?.moves.length||0);renderBoard();
  </script>
</body>
</html>
